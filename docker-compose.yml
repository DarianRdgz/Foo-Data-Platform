services:
  db:
    image: postgres:16
    container_name: fdp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - fdp_pgdata:/var/lib/postgresql/data
      
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fdp-backend
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      FDP_GEO_SEEDING_ENABLED: ${FDP_GEO_SEEDING_ENABLED:-false}
      FDP_GEO_SEED_DIR: ${FDP_GEO_SEED_DIR:-/opt/fdp/seed}
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - ./docker/seed:/opt/fdp/seed:ro
      - ./docker/zillow:/opt/fdp/zillow:ro

  test:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
      - ~/.m2:/root/.m2
      - ./docker/seed:/opt/fdp/seed:ro
      - ./docker/zillow:/opt/fdp/zillow:ro
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_FLYWAY_ENABLED: "true"
    depends_on:
      - db
    entrypoint: ["mvn", "test"]

volumes:
  fdp_pgdata: