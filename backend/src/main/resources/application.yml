server:
  port: 8080

spring:
  application:
    name: fdp

  datasource:
    url: jdbc:postgresql://db:5432/fdp
    username: ${POSTGRES_USER:fdp}
    password: ${POSTGRES_PASSWORD:fdp}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

kroger:
  client-id: ${KROGER_CLIENT_ID:}
  client-secret: ${KROGER_CLIENT_SECRET:}
  api:
    base-url: ${KROGER_API_BASE_URL:https://api-ce.kroger.com/v1}

  oauth:
    token-url: https://api-ce.kroger.com/v1/connect/oauth2/token
    scope: product.compact

zillow:
  data-dir: ${ZILLOW_DATA_DIR:/opt/fdp/zillow}
  base-url: ${ZILLOW_BASE_URL:https://files.zillowstatic.com/research/public_csvs}
  batch-size: ${ZILLOW_BATCH_SIZE:750}
  download-retries: ${ZILLOW_DOWNLOAD_RETRIES:3}

cde:
  mode: ${CDE_MODE:LOCAL}
  download-page-url: ${CDE_DOWNLOAD_PAGE_URL:https://cde.ucr.cjis.gov/LATEST/webapp/#/pages/downloads}
  download-dir: ${CDE_DOWNLOAD_DIR:/opt/fdp/cde/inbox}
  work-dir: ${CDE_WORK_DIR:/opt/fdp/cde/work}
  connect-timeout-seconds: 30
  read-timeout-seconds: 60

fred:
  api-key: ${FRED_API_KEY:}
  base-url: ${FRED_BASE_URL:https://api.stlouisfed.org}
  connect-timeout-seconds: 10
  read-timeout-seconds: 30
  rate-limiter:
    limit-for-period-per-minute: 100  # FRED allows 120/min
    timeout-millis: 5000

college-scorecard:
  base-url: ${COLLEGESCORECARD_BASE_URL:https://api.data.gov/ed/collegescorecard}
  api-key: ${COLLEGESCORECARD_API_KEY:}
  schools-path: /v1/schools.json
  page-size: ${COLLEGESCORECARD_PAGE_SIZE:100}
  connect-timeout-seconds: 30
  read-timeout-seconds: 60

fema:
  disaster-declarations-url: ${FEMA_DISASTER_DECLARATIONS_URL:https://www.fema.gov/api/open/v2/DisasterDeclarationsSummaries.csv}
  connect-timeout-seconds: 30
  read-timeout-seconds: 120

noaa:
  storm-events-base-url: ${NOAA_STORM_EVENTS_BASE_URL:https://www.ncei.noaa.gov/pub/data/swdi/stormevents/csvfiles}
  connect-timeout-seconds: 30
  read-timeout-seconds: 120

fdp:
  admin:
    api-key: ${FDP_ADMIN_API_KEY:}
  quota:
    daily-limits:
      KROGER: ${FDP_QUOTA_KROGER_DAILY_LIMIT:10000}
  scheduler:
    kroger:
      enabled: false                  
      locations:
        cron: "0 0 2 * * *"          # 2:00am daily
        zipCodes:
          - "77002"
          - "77003"
          - "77004"
      products:
        cron: "0 30 2 * * *"         # 2:30am daily 
        locationIds: []               
        searchTerms:
          - "milk"
          - "eggs"
          - "bread"
          - "rice"
          - "chicken"
    zillow:
      enabled: false
      zhvi:
        cron: "0 0 3 17 * *"
      zori:
        cron: "0 15 3 17 * *"
      listings:
        cron: "0 30 3 17 * *"
      affordability:
        cron: "0 45 3 17 * *"
    crime:
      enabled: false
      cde:
        cron: "0 0 4 1 10 *"   # 4:00am on 1st October (FBI releases prior-year data in September)
    fred:
      enabled: false
      series:
        cron: "0 0 5 2 * *"    # 5:00am on the 2nd of each month
    education:
      enabled: false
      college-scorecard:
        cron: "0 0 6 2 8 *"    # 6:00am on 2nd August (Scorecard releases yearly data in late July)
    disaster:
      enabled: false
      fema:
        cron: "0 0 7 5 1 *"    # 7:00am on 5th January
      noaa:
        cron: "0 30 7 5 1 *"   # 7:30am on 5th January (staggered after FEMA)
  geo:
      levels:
        enabled: [national, state, metro, county, city, zip]
      seeding:
        enabled: ${FDP_GEO_SEEDING_ENABLED:false}
        seedDir: ${FDP_GEO_SEED_DIR:/opt/fdp/seed}