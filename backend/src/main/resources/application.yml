server:
  port: 8080

spring:
  application:
    name: fdp

  datasource:
    url: jdbc:postgresql://db:5432/fdp
    username: ${POSTGRES_USER:fdp}
    password: ${POSTGRES_PASSWORD:fdp}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

kroger:
  client-id: ${KROGER_CLIENT_ID:}
  client-secret: ${KROGER_CLIENT_SECRET:}
  api:
    base-url: ${KROGER_API_BASE_URL:https://api-ce.kroger.com/v1}

  oauth:
    token-url: https://api-ce.kroger.com/v1/connect/oauth2/token
    scope: product.compact

fdp:
  admin:
    api-key: ${FDP_ADMIN_API_KEY:}
  scheduler:
    kroger:
      enabled: false                  # flip to true via admin dashboard when ready
      locations:
        cron: "0 0 2 * * *"          # 2:00am daily (sec min hour day month weekday)
        zipCodes:
          - "77002"
          - "77003"
          - "77004"
      products:
        cron: "0 30 2 * * *"         # 2:30am daily (runs after locations)
        locationIds: []               # populate with real Kroger location IDs from store_location
        searchTerms:
          - "milk"
          - "eggs"
          - "bread"
          - "rice"
          - "chicken"
